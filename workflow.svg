<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e8609a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="580" fill="#fff5f8" rx="16"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#c0407a">GirlMath Decision Engine — Application Workflow</text>

  <!-- ── STEP 1 ── -->
  <rect x="330" y="60" width="200" height="70" rx="14" fill="#fde8f0" stroke="#e8609a" stroke-width="2"/>
  <text x="430" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0407a">🌸 Step 1</text>
  <text x="430" y="106" text-anchor="middle" font-size="11" fill="#3a2540">User selects decision type</text>
  <text x="430" y="120" text-anchor="middle" font-size="10" fill="#a07898">Personal  or  Financial</text>

  <!-- Arrow 1→2 -->
  <line x1="430" y1="130" x2="430" y2="158" stroke="#e8609a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STEP 2 ── -->
  <rect x="330" y="160" width="200" height="70" rx="14" fill="#fde8f0" stroke="#e8609a" stroke-width="2"/>
  <text x="430" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0407a">📝 Step 2</text>
  <text x="430" y="206" text-anchor="middle" font-size="11" fill="#3a2540">User describes decision</text>
  <text x="430" y="220" text-anchor="middle" font-size="10" fill="#a07898">Free text input</text>

  <!-- Arrow 2→3 -->
  <line x1="430" y1="230" x2="430" y2="258" stroke="#e8609a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STEP 3 ── -->
  <rect x="280" y="260" width="300" height="80" rx="14" fill="#fde8f0" stroke="#e8609a" stroke-width="2"/>
  <text x="430" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0407a">🎚️ Step 3</text>
  <text x="430" y="303" text-anchor="middle" font-size="11" fill="#3a2540">Rate Mood · Urgency · Confidence</text>
  <text x="430" y="319" text-anchor="middle" font-size="10" fill="#a07898">Toggle Future Dependency</text>
  <text x="430" y="333" text-anchor="middle" font-size="10" fill="#a07898">(+ Cost inputs if Financial)</text>

  <!-- Arrow 3→scoring -->
  <line x1="430" y1="340" x2="430" y2="368" stroke="#e8609a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── SCORING ── -->
  <rect x="255" y="370" width="350" height="60" rx="14" fill="#fff" stroke="#e8609a" stroke-width="2"/>
  <text x="430" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0407a">⚙️ JavaScript Scoring Algorithm</text>
  <text x="430" y="415" text-anchor="middle" font-size="10" fill="#a07898">Calculates Emotional Bias · Dependency · Strain · Delay · Overall Score</text>

  <!-- Arrow scoring→api -->
  <line x1="430" y1="430" x2="430" y2="458" stroke="#e8609a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── GROQ API ── -->
  <rect x="255" y="460" width="350" height="60" rx="14" fill="#e8f4fd" stroke="#7ab8e8" stroke-width="2"/>
  <text x="430" y="485" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a8fc0">🤖 Groq API — Llama 3.3 70B</text>
  <text x="430" y="505" text-anchor="middle" font-size="10" fill="#a07898">Generates verdict · breakdown · recommendation as JSON</text>

  <!-- Arrow api→results -->
  <line x1="430" y1="520" x2="430" y2="548" stroke="#7ab8e8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── RESULTS ── -->
  <rect x="180" y="550" width="500" height="14" rx="7" fill="#e8609a" opacity="0.15"/>
  <rect x="180" y="548" width="500" height="22" rx="11" fill="none" stroke="#e8609a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="430" y="564" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0407a">✦ Results: Impulse Risk Score · AI Verdict · 4 Breakdown Cards · Recommendation</text>

  <!-- Side labels -->
  <text x="100" y="300" text-anchor="middle" font-size="10" fill="#a07898" transform="rotate(-90,100,300)">USER ACTIONS</text>
  <line x1="118" y1="65" x2="118" y2="535" stroke="#f4a7c3" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="760" y="450" text-anchor="middle" font-size="10" fill="#7ab8e8" transform="rotate(90,760,450)">AI PROCESSING</text>
  <line x1="742" y1="370" x2="742" y2="535" stroke="#a8d8f0" stroke-width="1" stroke-dasharray="4,4"/>

</svg>
