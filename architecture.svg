<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e8609a"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7ab8e8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#fff5f8" rx="16"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#c0407a">GirlMath Decision Engine — System Architecture</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- COLUMN 1: USER INPUT  x=20, w=170 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="20" y="60" width="170" height="380" rx="14" fill="#fde8f0" stroke="#e8609a" stroke-width="2"/>
  <text x="105" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0407a">USER INPUT</text>

  <!-- Step 1 -->
  <rect x="35" y="95" width="140" height="56" rx="8" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="105" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#3a2540">Step 1</text>
  <text x="105" y="132" text-anchor="middle" font-size="10" fill="#a07898">Pick Decision Type</text>
  <text x="105" y="145" text-anchor="middle" font-size="10" fill="#a07898">Personal / Financial</text>

  <!-- Step 2 -->
  <rect x="35" y="163" width="140" height="56" rx="8" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="105" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="#3a2540">Step 2</text>
  <text x="105" y="200" text-anchor="middle" font-size="10" fill="#a07898">Describe Decision</text>
  <text x="105" y="213" text-anchor="middle" font-size="10" fill="#a07898">in own words</text>

  <!-- Step 3 -->
  <rect x="35" y="231" width="140" height="56" rx="8" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="105" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#3a2540">Step 3</text>
  <text x="105" y="268" text-anchor="middle" font-size="10" fill="#a07898">Mood / Urgency /</text>
  <text x="105" y="281" text-anchor="middle" font-size="10" fill="#a07898">Confidence Sliders</text>

  <!-- Financial Inputs -->
  <rect x="35" y="299" width="140" height="44" rx="8" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="105" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#3a2540">Financial Inputs</text>
  <text x="105" y="334" text-anchor="middle" font-size="10" fill="#a07898">Cost / Capacity / Months</text>

  <!-- Future Dependency -->
  <rect x="35" y="355" width="140" height="44" rx="8" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="105" y="374" text-anchor="middle" font-size="11" font-weight="bold" fill="#3a2540">Future Dependency</text>
  <text x="105" y="390" text-anchor="middle" font-size="10" fill="#a07898">Toggle (Yes / No)</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="260" x2="228" y2="260" stroke="#e8609a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- COLUMN 2: SCORING ENGINE  x=230, w=160 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="230" y="110" width="165" height="310" rx="14" fill="#fde8f0" stroke="#e8609a" stroke-width="2"/>
  <text x="312" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0407a">SCORING ENGINE</text>
  <text x="312" y="149" text-anchor="middle" font-size="10" fill="#a07898">(Vanilla JavaScript)</text>

  <rect x="245" y="160" width="135" height="34" rx="7" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="312" y="182" text-anchor="middle" font-size="10" fill="#3a2540">Emotional Bias Score</text>

  <rect x="245" y="202" width="135" height="34" rx="7" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="312" y="224" text-anchor="middle" font-size="10" fill="#3a2540">Future Dependency Score</text>

  <rect x="245" y="244" width="135" height="34" rx="7" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="312" y="266" text-anchor="middle" font-size="10" fill="#3a2540">Resource Strain Score</text>

  <rect x="245" y="286" width="135" height="34" rx="7" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="312" y="308" text-anchor="middle" font-size="10" fill="#3a2540">Delay Risk Score</text>

  <rect x="245" y="334" width="135" height="30" rx="7" fill="#e8609a"/>
  <text x="312" y="354" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Overall Risk Score / 100</text>

  <!-- Arrow 2 -->
  <line x1="395" y1="260" x2="433" y2="260" stroke="#e8609a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- COLUMN 3: GROQ API  x=435, w=165 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="435" y="110" width="165" height="310" rx="14" fill="#e8f4fd" stroke="#7ab8e8" stroke-width="2"/>
  <text x="517" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a8fc0">GROQ API</text>
  <text x="517" y="149" text-anchor="middle" font-size="10" fill="#a07898">Llama 3.3 70B</text>

  <rect x="450" y="160" width="135" height="44" rx="7" fill="#fff" stroke="#a8d8f0" stroke-width="1.5"/>
  <text x="517" y="179" text-anchor="middle" font-size="10" fill="#3a2540">Receives scores +</text>
  <text x="517" y="195" text-anchor="middle" font-size="10" fill="#3a2540">full user context</text>

  <rect x="450" y="214" width="135" height="44" rx="7" fill="#fff" stroke="#a8d8f0" stroke-width="1.5"/>
  <text x="517" y="233" text-anchor="middle" font-size="10" fill="#3a2540">Generates verdict +</text>
  <text x="517" y="249" text-anchor="middle" font-size="10" fill="#3a2540">breakdown JSON</text>

  <rect x="450" y="268" width="135" height="44" rx="7" fill="#fff" stroke="#a8d8f0" stroke-width="1.5"/>
  <text x="517" y="287" text-anchor="middle" font-size="10" fill="#3a2540">Parses structured</text>
  <text x="517" y="303" text-anchor="middle" font-size="10" fill="#3a2540">JSON response</text>

  <rect x="450" y="334" width="135" height="30" rx="7" fill="#4a8fc0"/>
  <text x="517" y="354" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Returns to Frontend</text>

  <!-- Arrow 3 -->
  <line x1="600" y1="260" x2="638" y2="260" stroke="#7ab8e8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- COLUMN 4: RESULTS  x=640, w=195 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="640" y="110" width="195" height="310" rx="14" fill="#edf8f0" stroke="#3a7d5a" stroke-width="2"/>
  <text x="737" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a7d5a">RESULTS UI</text>

  <rect x="655" y="145" width="165" height="36" rx="7" fill="#fff" stroke="#b8edd8" stroke-width="1.5"/>
  <text x="737" y="168" text-anchor="middle" font-size="10" fill="#3a2540">Animated Impulse Risk Score</text>

  <rect x="655" y="191" width="165" height="36" rx="7" fill="#fff" stroke="#b8edd8" stroke-width="1.5"/>
  <text x="737" y="214" text-anchor="middle" font-size="10" fill="#3a2540">AI Verdict (Pacifico font)</text>

  <rect x="655" y="237" width="165" height="36" rx="7" fill="#fff" stroke="#b8edd8" stroke-width="1.5"/>
  <text x="737" y="260" text-anchor="middle" font-size="10" fill="#3a2540">4 Breakdown Cards (Masonry)</text>

  <rect x="655" y="283" width="165" height="36" rx="7" fill="#fff" stroke="#b8edd8" stroke-width="1.5"/>
  <text x="737" y="306" text-anchor="middle" font-size="10" fill="#3a2540">✦ Recommendation</text>

  <rect x="655" y="334" width="165" height="30" rx="7" fill="#3a7d5a"/>
  <text x="737" y="354" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Start Over → Reset State</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TECH STACK BAR -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="20" y="458" width="815" height="62" rx="10" fill="#fff" stroke="#f4a7c3" stroke-width="1.5"/>
  <text x="427" y="478" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0407a">Tech Stack</text>
  <text x="427" y="502" text-anchor="middle" font-size="11" fill="#3a2540">HTML5  ·  CSS3  ·  Vanilla JavaScript  ·  Groq API (Llama 3.3 70B)  ·  Git  ·  GitHub</text>

</svg>
